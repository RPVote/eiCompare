# Run styler check
# https://github.com/r-lib/styler
name: Styler

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  check-style:
    if: "!contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::styler
          needs: styler

      - name: Style
        run: |
          styled <- styler::style_pkg(dry = "on")
          errored <- is.na(styled$changed)
          if (any(errored)) {
            cat("Warning: styler could not parse", sum(errored), "file(s):\n")
            cat(paste(styled$file[errored], collapse = "\n"), "\n")
          }
          needs_restyle <- styled$changed & !is.na(styled$changed)
          if (any(needs_restyle)) {
            files <- styled$file[needs_restyle]
            stop(paste(
              "The following files need restyling:",
              paste(files, collapse = "\n"),
              "\nRun styler::style_pkg() locally and commit the changes.",
              sep = "\n"
            ))
          }
          cat("All files conform to style guidelines.\n")
        shell: Rscript {0}
